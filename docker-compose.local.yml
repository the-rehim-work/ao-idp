services:
  idp:
    build: .
    image: ao-images/ao-idp-server:latest
    container_name: ao-idp
    expose:
      - "7000"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_NAME: ${DB_NAME:-ao_idp}
      DB_USERNAME: ${DB_USERNAME:-ao_idp}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      IDP_ISSUER: https://auth.ao.az
      COOKIE_DOMAIN: ao.az
    volumes:
      - ao-idp-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ao-idp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/auth.ao.az.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx-entrypoint.sh:/entrypoint.sh:ro
      - nginx-certs:/etc/nginx/certs
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - idp
    restart: unless-stopped

volumes:
  ao-idp-postgres:
  nginx-certs:
