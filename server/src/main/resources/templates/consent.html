<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="az">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${appName != null ? '[' + appName + '] AO ID — İcazə tələbi' : 'AO ID — İcazə tələbi'}">AO ID — İcazə tələbi</title>
    <link rel="icon" th:href="@{/favicon.ico}">
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --maroon:   #5e1c1f;
            --maroon-d: #441214;
            --maroon-l: #7a2528;
            --gold:     #c9a032;
            --gold-l:   #e0bf57;
            --gold-d:   #9c7c1f;
            --cream:    #f5efe1;
            --cream-2:  #ece4d0;
            --beige:    #d8cfb8;
            --ink:      #2d2018;
            --ink-soft: #5e5040;
            --muted:    #7a6f5d;
            --az-red:   #EF3340;
            --serif:    'Cinzel', 'Georgia', serif;
            --sans:     'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        html, body { min-height: 100%; }

        body {
            font-family: var(--sans);
            color: var(--ink);
            background-color: var(--cream-2);
            background-image: linear-gradient(180deg, #f6f1e7 0%, #eee5d4 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            background: var(--maroon);
            color: var(--gold-l);
            border-bottom: 2px solid var(--gold);
            padding: 0.55rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        .topbar-left { display: inline-flex; align-items: center; gap: 0.65rem; }
        .flag-az { width: 28px; height: 14px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.25); }
        .stamp {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.2rem 0.55rem;
            border: 1px solid rgba(224,191,87,0.4);
            color: var(--gold-l);
            font-weight: 600;
            font-size: 0.65rem;
        }
        .stamp::before { content: ''; width: 6px; height: 6px; background: var(--gold-l); border-radius: 50%; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem 3rem;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border: 1px solid var(--beige);
            border-radius: 4px;
            box-shadow:
                0 1px 0 rgba(255,255,255,0.6) inset,
                0 12px 36px rgba(94, 28, 31, 0.12),
                0 2px 8px rgba(45, 32, 24, 0.06);
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg,
                var(--maroon) 0%, var(--maroon) 33.33%,
                var(--gold) 33.33%, var(--gold) 66.66%,
                var(--maroon) 66.66%, var(--maroon) 100%);
        }

        .card-body {
            padding: 1.75rem 1.5rem 1.5rem;
            text-align: center;
        }

        .crest {
            width: 96px;
            height: 96px;
            margin: 0 auto 0.85rem;
            display: block;
            filter: drop-shadow(0 4px 10px rgba(94,28,31,0.2));
        }

        .app-name {
            font-family: var(--serif);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--maroon);
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }

        .lead {
            font-size: 0.92rem;
            color: var(--ink-soft);
            margin-bottom: 1.25rem;
            line-height: 1.55;
        }

        .scope-list {
            text-align: left;
            border: 1px solid var(--beige);
            background: #fbf8ee;
            padding: 0.85rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.86rem;
            color: var(--ink-soft);
            list-style: none;
        }

        .scope-list li {
            display: flex;
            gap: 0.55rem;
            padding: 0.3rem 0;
        }

        .scope-list li svg {
            flex-shrink: 0;
            width: 16px; height: 16px;
            color: var(--gold-d);
            margin-top: 0.15rem;
        }

        .actions { display: flex; gap: 0.65rem; }

        .btn {
            flex: 1;
            padding: 0.85rem 1rem;
            font-family: var(--sans);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 3px;
            transition: filter 0.15s, box-shadow 0.15s, transform 0.05s;
        }

        .btn-allow {
            background: linear-gradient(180deg, var(--maroon-l) 0%, var(--maroon) 100%);
            color: var(--gold-l);
            border: 1px solid var(--maroon-d);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.15),
                0 4px 10px rgba(94,28,31,0.25);
        }

        .btn-allow:hover { filter: brightness(1.06); }

        .btn-deny {
            background: #fff;
            color: var(--ink-soft);
            border: 1px solid var(--beige);
        }

        .btn-deny:hover { border-color: var(--az-red); color: var(--az-red); }

        .btn:active { transform: translateY(1px); }

        footer {
            background: var(--maroon);
            color: var(--gold-l);
            border-top: 2px solid var(--gold);
            padding: 0.85rem 1.25rem;
            text-align: center;
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        footer .motto { font-family: var(--serif); font-weight: 700; letter-spacing: 0.28em; }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <svg class="flag-az" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="60" height="10" fill="#00B5E2"/>
            <rect y="10" width="60" height="10" fill="#EF3340"/>
            <rect y="20" width="60" height="10" fill="#00f5ff"/>
            <circle cx="28" cy="15" r="3.6" fill="#fff"/>
            <circle cx="29.4" cy="15" r="3.0" fill="#EF3340"/>
            <polygon fill="#fff" transform="translate(34 15)" points="0,-2.8 0.43,-1.03 1.98,-1.98 1.03,-0.43 2.8,0 1.03,0.43 1.98,1.98 0.43,1.03 0,2.8 -0.43,1.03 -1.98,1.98 -1.03,0.43 -2.8,0 -1.03,-0.43 -1.98,-1.98 -0.43,-1.03"/>
        </svg>
        <span>Azərbaycan Respublikası</span>
    </div>
    <span class="stamp">İcazə tələbi</span>
</header>

<main>
    <section class="card">
        <div class="card-body">
            <img src="/img/mod-crest.png" alt="AO ID gerbi" class="crest"/>
            <div class="app-name" th:text="${appName} ?: 'Tətbiq'">Tətbiq</div>
            <p class="lead">hesabınıza giriş tələb edir</p>

            <ul class="scope-list">
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Kimlik məlumatlarınızı oxumaq
                </li>
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Profil və e-poçt məlumatlarını oxumaq
                </li>
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Təyin olunmuş rolları oxumaq
                </li>
            </ul>

            <form th:action="@{/authorize/consent}" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="actions">
                    <button type="submit" name="approved" value="false" class="btn btn-deny">İmtina et</button>
                    <button type="submit" name="approved" value="true"  class="btn btn-allow">Təsdiq et</button>
                </div>
            </form>
        </div>
    </section>
</main>

<footer>
    AO Kimlik Təminatçısı &nbsp;·&nbsp; <span class="motto">Vətən Sağ Olsun</span>
</footer>

</body>
</html>
