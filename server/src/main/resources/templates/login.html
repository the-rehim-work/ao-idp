<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="az">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${appName != null ? appName + ' — AO ID' : 'AO ID — Daxil ol'}">AO ID — Daxil ol</title>
    <style>
        @font-face {
            font-family: 'JetBrains Mono';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('/fonts/jbm-400.woff2') format('woff2');
        }
        @font-face {
            font-family: 'JetBrains Mono';
            font-style: normal;
            font-weight: 600 700;
            font-display: swap;
            src: url('/fonts/jbm-600.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('/fonts/inter-400.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url('/fonts/inter-500.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('/fonts/inter-600.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('/fonts/inter-700.woff2') format('woff2');
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --c:    #5eead4;
            --cd:   #2dd4bf;
            --cm:   #0d9488;
            --cb:   #134e4a;
            --bg:   #0a0c10;
            --s:    #12161e;
            --s2:   #1a1f29;
            --br:   rgba(94,234,212,0.25);
            --glow: 0 0 8px rgba(94,234,212,0.5), 0 0 20px rgba(94,234,212,0.2);
            --font: 'JetBrains Mono', 'Courier New', monospace;
            --txt:  #e7ebf0;
        }

        html, body { min-height: 100vh; background: var(--bg); color: var(--c); font-family: var(--font); }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,255,0.012) 2px,
                rgba(0,255,255,0.012) 4px
            );
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 40%, rgba(0,255,255,0.05) 0%, transparent 65%);
        }

        .wrap {
            width: 100%;
            max-width: 360px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .hd {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hd-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border: 1px solid var(--br);
            background: var(--s);
            margin-bottom: 1rem;
            box-shadow: var(--glow);
        }

        .hd-dot svg { filter: drop-shadow(0 0 4px rgba(0,255,255,0.8)); }

        .hd-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--c);
            text-shadow: 0 0 8px rgba(0,255,255,0.9), 0 0 24px rgba(0,255,255,0.4);
        }

        .hd-sub {
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cb);
            margin-top: 0.3rem;
        }

        /* ── App banner ── */
        .app-banner {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.85rem;
            border: 1px solid rgba(0,255,255,0.2);
            border-left: 2px solid var(--c);
            background: rgba(0,255,255,0.04);
            font-size: 0.75rem;
            color: var(--cd);
            margin-bottom: 1rem;
        }

        .app-banner strong { color: var(--c); font-weight: 700; }

        /* ── Card ── */
        .card {
            background: var(--s);
            border: 1px solid var(--br);
            padding: 1.75rem;
            box-shadow: 0 0 30px rgba(0,255,255,0.06), inset 0 0 30px rgba(0,255,255,0.015);
        }

        .card-label {
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cb);
            margin-bottom: 0.2rem;
        }

        .card-prompt {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--c);
            text-shadow: 0 0 6px rgba(0,255,255,0.5);
            margin-bottom: 1.5rem;
        }

        /* ── Error ── */
        .err {
            display: flex;
            gap: 0.5rem;
            border: 1px solid rgba(255,51,51,0.35);
            background: rgba(255,51,51,0.06);
            color: #ff4444;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 0 8px rgba(255,51,51,0.15);
        }

        .err-tag { flex-shrink: 0; font-weight: 700; }

        /* ── Fields ── */
        .field { margin-bottom: 1rem; }

        .field label {
            display: block;
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cd);
            margin-bottom: 0.4rem;
        }

        .field input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--br);
            color: var(--c);
            font-family: var(--font);
            font-size: 0.875rem;
            outline: none;
            caret-color: var(--c);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .field input::placeholder { color: var(--cb); }

        .field input:focus {
            border-color: var(--c);
            box-shadow: var(--glow);
        }

        /* ── Submit ── */
        .btn {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--c);
            color: var(--c);
            font-family: var(--font);
            font-size: 0.8125rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: var(--glow);
        }

        .btn:hover {
            background: var(--c);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0,255,255,0.8), 0 0 40px rgba(0,255,255,0.4);
        }

        /* ── Footer meta ── */
        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0,255,255,0.1);
            font-size: 0.625rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--cb);
        }

        .meta span { display: inline-flex; align-items: center; gap: 0.35rem; }

        .meta-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--cb);
            display: inline-block;
        }

        /* ── Continue As ── */
        .continue-panel {
            margin-bottom: 0.75rem;
            border-left: 2px solid var(--c);
            background: var(--s);
            border-top: 1px solid rgba(0,255,255,0.15);
            border-right: 1px solid rgba(0,255,255,0.15);
            border-bottom: 1px solid rgba(0,255,255,0.15);
        }
        .continue-as-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,255,255,0.06);
        }
        .continue-as {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 0.85rem;
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
            text-align: left;
        }
        .continue-as:hover { background: rgba(0,255,255,0.06); }
        .continue-avatar {
            width: 32px; height: 32px;
            border: 1px solid rgba(0,255,255,0.5);
            background: var(--s2);
            box-shadow: 0 0 6px rgba(0,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font);
            font-weight: 700; font-size: 0.8rem; color: var(--c); flex-shrink: 0;
        }
        .continue-info { flex: 1; min-width: 0; }
        .continue-name { font-size: 0.8rem; font-weight: 700; color: var(--c); font-family: var(--font); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .continue-hint { font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--cb); margin-bottom: 0.1rem; font-family: var(--font); }
        .continue-chevron { color: var(--cm); flex-shrink: 0; }
        .continue-signout {
            background: none; border: none; border-left: 1px solid rgba(0,255,255,0.08);
            cursor: pointer; color: var(--cb);
            padding: 0 0.75rem;
            flex-shrink: 0; height: 100%;
            display: flex; align-items: center; gap: 0.3rem;
            font-family: var(--font); font-size: 0.52rem;
            letter-spacing: 0.14em; text-transform: uppercase;
            transition: color 0.12s, background 0.12s;
            white-space: nowrap;
        }
        .continue-signout:hover { color: #f87171; background: rgba(239,68,68,0.06); }
        .continue-other {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.55rem 1rem;
            width: 100%; background: transparent; border: none;
            border-top: 1px solid rgba(0,255,255,0.08);
            cursor: pointer;
            font-size: 0.575rem; letter-spacing: 0.18em; text-transform: uppercase;
            color: var(--cb); font-family: var(--font);
            transition: color 0.12s, background 0.12s;
        }
        .continue-other:hover { color: var(--cd); background: rgba(0,255,255,0.04); }

        .divider {
            display: flex; align-items: center; gap: 0.75rem;
            font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--cb);
            margin-bottom: 1rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,255,255,0.1); }

        /* ── Bottom ── */
        .bottom {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--cb);
        }
    </style>
    <!-- Custom CSS from settings (injected safely) -->
    <style th:if="${brandingCustomCss != null && !#strings.isEmpty(brandingCustomCss)}" th:text="${brandingCustomCss}"></style>
</head>
<body>

<script th:inline="javascript">
(function() {
    var r = document.documentElement;
    var pc = /*[[${brandingPrimaryColor}]]*/ '#5eead4';
    var bg = /*[[${brandingBgColor}]]*/ '#0a0c10';
    var tc = /*[[${brandingTextColor}]]*/ '#e7ebf0';
    if (pc) {
        r.style.setProperty('--c', pc);
        r.style.setProperty('--cd', pc);
        // compute a darker shade for --cb
        r.style.setProperty('--br', 'rgba(0,0,0,0.3)');
    }
    if (bg) r.style.setProperty('--bg', bg);
    if (tc) {
        r.style.setProperty('--txt', tc);
        r.style.setProperty('--cm', tc);
    }
})();
</script>

<div class="wrap">

    <!-- Logo: show custom logo if set, otherwise default SVG icon -->
    <div class="hd">
        <th:block th:if="${brandingLogoUrl != null && !#strings.isEmpty(brandingLogoUrl)}">
            <div class="hd-dot" style="background:transparent;border:none;box-shadow:none;">
                <img th:src="${brandingLogoUrl}" alt="logo" style="max-width:64px;max-height:64px;object-fit:contain;" />
            </div>
        </th:block>
        <th:block th:unless="${brandingLogoUrl != null && !#strings.isEmpty(brandingLogoUrl)}">
            <div class="hd-dot">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--c)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="1"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <circle cx="12" cy="16" r="1.5" fill="var(--c)" stroke="none"/>
                </svg>
            </div>
        </th:block>
        <div class="hd-title">AO ID</div>
        <div class="hd-sub" th:text="${brandingWelcomeText != null && !#strings.isEmpty(brandingWelcomeText) ? brandingWelcomeText : 'auth.ao.az · kimlik təminatçısı'}">
            auth.ao.az · kimlik təminatçısı
        </div>
    </div>

    <div th:if="${clientId != null}" class="app-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span><strong th:text="${appName != null ? appName : clientId}">tətbiq</strong> hesabınıza giriş tələb edir</span>
    </div>

    <div id="continue-as-section" style="display:none;" class="continue-panel">
        <div id="continue-accounts"></div>
        <button type="button" class="continue-other" onclick="useOtherAccount()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            başqa hesabla daxil ol
        </button>
    </div>

    <div class="card">

        <div th:if="${error}" class="err" role="alert">
            <span class="err-tag">[ERR]</span>
            <span th:text="${error}">Kimlik təsdiqi alınmadı</span>
        </div>

        <form th:action="@{/login}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="client_id"             th:value="${clientId}"/>
            <input type="hidden" name="redirect_uri"          th:value="${redirectUri}"/>
            <input type="hidden" name="state"                 th:value="${state}"/>
            <input type="hidden" name="scope"                 th:value="${scope}"/>
            <input type="hidden" name="code_challenge"        th:value="${codeChallenge}"/>
            <input type="hidden" name="code_challenge_method" th:value="${codeChallengeMethod}"/>
            <input type="hidden" name="identifier_mode" id="identifier_mode"
                   th:value="${identifierType == 'email' ? 'email' : (identifierType == 'any' ? 'any' : 'username')}"/>

            <div class="field">
                <label for="username" id="username-label"
                       th:text="${identifierType == 'email' ? 'e-poçt' : 'istifadəçi adı'}">istifadəçi adı</label>
                <input th:type="${identifierType == 'email' ? 'email' : 'text'}"
                       id="username" name="username"
                       th:autocomplete="${identifierType == 'email' ? 'email' : 'username'}"
                       autofocus required
                       th:placeholder="${identifierType == 'email' ? 'user@example.com' : (identifierType == 'any' ? 'username və ya e-poçt' : 'username')}"/>
            </div>

            <div class="field">
                <label for="password">şifrə</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required
                       placeholder="şifrənizi daxil edin"/>
            </div>

            <button type="submit" class="btn">Daxil ol</button>
        </form>

    </div>

    <div class="bottom" th:text="${brandingFooterText != null && !#strings.isEmpty(brandingFooterText) ? brandingFooterText : 'AO Identity Provider · TLS qorunur · 2026'}">
        AO Identity Provider · TLS qorunur · 2026
    </div>
</div>

<script>
(function() {
    var modeField = document.getElementById('identifier_mode');
    if (!modeField || modeField.value !== 'any') return;
    var input = document.getElementById('username');
    var label = document.getElementById('username-label');
    if (!input || !label) return;
    input.addEventListener('input', function() {
        var isEmail = input.value.indexOf('@') !== -1;
        label.textContent = isEmail ? 'e-poçt' : 'istifadəçi adı';
    });
})();

// ── Multi-account continue-as ─────────────────────────────────────────────────

var _continueAsEnabled = /*[[${continueAsEnabled}]]*/ true;

function _getCookie(name) {
    var m = document.cookie.match('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '=([^;]*)');
    return m ? decodeURIComponent(m[1]) : null;
}

function _b64Decode(str) {
    try {
        return decodeURIComponent(atob(str.replace(/-/g,'+').replace(/_/g,'/')).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
    } catch(e) { return null; }
}

function _b64Encode(str) {
    return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function _escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getStoredProfiles() {
    var raw = _getCookie('ao-user');
    if (!raw) return [];
    var json = _b64Decode(raw);
    if (!json) return [];
    try {
        var parsed = JSON.parse(json);
        if (Array.isArray(parsed)) return parsed.filter(function(p){ return p && p.u; });
        if (parsed && parsed.u) return [parsed];
    } catch(e) {}
    return [];
}

function saveStoredProfiles(profiles) {
    var value = _b64Encode(JSON.stringify(profiles));
    var secure = location.protocol === 'https:' ? '; Secure' : '';
    if (profiles.length === 0) {
        document.cookie = 'ao-user=; path=/; max-age=0' + secure;
    } else {
        document.cookie = 'ao-user=' + value + '; path=/; max-age=' + (30*24*3600) + secure;
    }
}

function renderContinueAs(profiles) {
    var section = document.getElementById('continue-as-section');
    var accountsEl = document.getElementById('continue-accounts');
    if (!section || !accountsEl) return;
    if (!profiles || profiles.length === 0) { section.style.display = 'none'; return; }
    var html = '';
    for (var i = 0; i < profiles.length; i++) {
        var p = profiles[i];
        var label = _escHtml(p.n || p.u);
        var initial = (p.n || p.u).charAt(0).toUpperCase();
        var uAttr = _escHtml(p.u).replace(/'/g,'&#39;');
        html += '<div class="continue-as-row">' +
            '<button type="button" class="continue-as" onclick="continueAsUser(\'' + uAttr + '\')">' +
            '<div class="continue-avatar">' + _escHtml(initial) + '</div>' +
            '<div class="continue-info">' +
            '<div class="continue-hint">davam et</div>' +
            '<div class="continue-name">' + label + '</div>' +
            '</div>' +
            '<svg class="continue-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
            '</button>' +
            '<button type="button" class="continue-signout" onclick="removeStoredAccount(\'' + uAttr + '\')" title="Bu hesabı saxlanmış sessiyalardan sil">' +
            '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>' +
            'Çıxış' +
            '</button>' +
            '</div>';
    }
    accountsEl.innerHTML = html;
    section.style.display = '';
}

function continueAsUser(username) {
    var usernameInput = document.getElementById('username');
    var passwordInput = document.getElementById('password');
    if (usernameInput) { usernameInput.value = username; }
    if (passwordInput) { passwordInput.focus(); }
}

function removeStoredAccount(username) {
    var profiles = getStoredProfiles().filter(function(p){ return p.u !== username; });
    saveStoredProfiles(profiles);
    renderContinueAs(profiles);
}

function useOtherAccount() {
    document.getElementById('continue-as-section').style.display = 'none';
    var usernameInput = document.getElementById('username');
    if (usernameInput) { usernameInput.value = ''; usernameInput.focus(); }
}

if (_continueAsEnabled) {
    renderContinueAs(getStoredProfiles());
}
</script>
</body>
</html>
