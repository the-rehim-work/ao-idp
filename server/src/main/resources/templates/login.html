<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="az">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${appName != null ? appName + ' — AO ID' : 'AO ID — Daxil ol'}">AO ID — Daxil ol</title>
    <style>
        /* ── Offline fonts ──────────────────────────────────────────────── */
        @font-face { font-family:'Inter'; font-style:normal; font-weight:400; font-display:swap; src:url('/fonts/inter-400.woff2') format('woff2'); }
        @font-face { font-family:'Inter'; font-style:normal; font-weight:500; font-display:swap; src:url('/fonts/inter-500.woff2') format('woff2'); }
        @font-face { font-family:'Inter'; font-style:normal; font-weight:600; font-display:swap; src:url('/fonts/inter-600.woff2') format('woff2'); }
        @font-face { font-family:'Inter'; font-style:normal; font-weight:700; font-display:swap; src:url('/fonts/inter-700.woff2') format('woff2'); }
        @font-face { font-family:'Outfit'; font-style:normal; font-weight:400; font-display:swap; src:url('/fonts/outfit-400.woff2') format('woff2'); }
        @font-face { font-family:'Outfit'; font-style:normal; font-weight:600; font-display:swap; src:url('/fonts/outfit-600.woff2') format('woff2'); }
        @font-face { font-family:'Outfit'; font-style:normal; font-weight:700; font-display:swap; src:url('/fonts/outfit-700.woff2') format('woff2'); }
        @font-face { font-family:'DM Sans'; font-style:normal; font-weight:400; font-display:swap; src:url('/fonts/dm-sans-400.woff2') format('woff2'); }
        @font-face { font-family:'DM Sans'; font-style:normal; font-weight:500; font-display:swap; src:url('/fonts/dm-sans-500.woff2') format('woff2'); }
        @font-face { font-family:'DM Sans'; font-style:normal; font-weight:700; font-display:swap; src:url('/fonts/dm-sans-700.woff2') format('woff2'); }
        @font-face { font-family:'Nunito'; font-style:normal; font-weight:400; font-display:swap; src:url('/fonts/nunito-400.woff2') format('woff2'); }
        @font-face { font-family:'Nunito'; font-style:normal; font-weight:600; font-display:swap; src:url('/fonts/nunito-600.woff2') format('woff2'); }
        @font-face { font-family:'Nunito'; font-style:normal; font-weight:700; font-display:swap; src:url('/fonts/nunito-700.woff2') format('woff2'); }
        @font-face { font-family:'Poppins'; font-style:normal; font-weight:400; font-display:swap; src:url('/fonts/poppins-400.woff2') format('woff2'); }
        @font-face { font-family:'Poppins'; font-style:normal; font-weight:600; font-display:swap; src:url('/fonts/poppins-600.woff2') format('woff2'); }
        @font-face { font-family:'Poppins'; font-style:normal; font-weight:700; font-display:swap; src:url('/fonts/poppins-700.woff2') format('woff2'); }
        @font-face { font-family:'Plus Jakarta Sans'; font-style:normal; font-weight:400; font-display:swap; src:url('/fonts/jakarta-400.woff2') format('woff2'); }
        @font-face { font-family:'Plus Jakarta Sans'; font-style:normal; font-weight:600; font-display:swap; src:url('/fonts/jakarta-600.woff2') format('woff2'); }
        @font-face { font-family:'Plus Jakarta Sans'; font-style:normal; font-weight:700; font-display:swap; src:url('/fonts/jakarta-700.woff2') format('woff2'); }

        /* ── Design tokens ──────────────────────────────────────────────── */
        :root {
            --primary:       #5eead4;
            --primary-hover: #2dd4bf;
            --primary-btn:   #0f1f1e;
            --bg:            #0a0c10;
            --surface:       #111827;
            --surface-2:     #1c2333;
            --surface-3:     #232e42;
            --border:        rgba(255,255,255,0.08);
            --border-accent: rgba(94,234,212,0.22);
            --text:          #f1f5f9;
            --text-dim:      #94a3b8;
            --text-muted:    #475569;
            --error:         #f87171;
            --error-bg:      rgba(248,113,113,0.08);
            --error-border:  rgba(248,113,113,0.22);
            --shadow:        0 4px 40px rgba(0,0,0,0.5);
            --font:          'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --radius:        12px;
            --radius-sm:     8px;
        }

        /* ── Reset ─────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 15px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
            position: relative;
        }

        /* Ambient glow background */
        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 60% 40% at 30% 15%, rgba(94,234,212,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 75% 85%, rgba(94,234,212,0.04) 0%, transparent 55%);
        }

        /* ── Wrapper ────────────────────────────────────────────────────── */
        .wrap {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        /* ── Card ───────────────────────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.03) inset;
        }

        /* ── Header / logo ──────────────────────────────────────────────── */
        .hd {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .hd-logo-img {
            height: 52px;
            max-width: 180px;
            object-fit: contain;
            display: block;
            margin: 0 auto 0.875rem;
        }
        .hd-icon {
            width: 52px; height: 52px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, rgba(94,234,212,0.18), rgba(94,234,212,0.04));
            border: 1px solid var(--border-accent);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.875rem;
        }
        .hd-title {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.025em;
            line-height: 1.2;
        }
        .hd-sub {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
        }

        /* ── App banner ─────────────────────────────────────────────────── */
        .app-banner {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.875rem;
            background: rgba(94,234,212,0.04);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-sm);
            font-size: 0.8125rem;
            color: var(--text-dim);
            margin-bottom: 1.25rem;
        }
        .app-banner strong { color: var(--primary); font-weight: 600; }

        /* ── Error ──────────────────────────────────────────────────────── */
        .err {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.75rem 0.875rem;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: var(--radius-sm);
            font-size: 0.8125rem;
            color: var(--error);
            margin-bottom: 1.25rem;
        }
        .err svg { flex-shrink: 0; margin-top: 1px; }

        /* ── Continue-as: account list ──────────────────────────────────── */
        .accounts-list {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
            margin-bottom: 1rem;
        }
        .account-row {
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .account-row:hover { border-color: var(--border-accent); }
        .account-main {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            min-width: 0;
            padding: 0.6875rem 0.875rem;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
            transition: background 0.12s;
        }
        .account-main:hover { background: rgba(94,234,212,0.04); }
        .account-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 700;
            color: #0a1a1a;
            flex-shrink: 0;
            font-family: var(--font);
        }
        .account-info { flex: 1; min-width: 0; text-align: left; }
        .account-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .account-uname {
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .account-chevron { color: var(--text-muted); flex-shrink: 0; transition: color 0.12s; }
        .account-main:hover .account-chevron { color: var(--primary); }
        .account-remove {
            padding: 0 0.75rem;
            align-self: stretch;
            display: flex;
            align-items: center;
            background: transparent;
            border: none;
            border-left: 1px solid var(--border);
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.12s, background 0.12s;
            flex-shrink: 0;
        }
        .account-remove:hover { color: var(--error); background: var(--error-bg); }

        /* ── Continue-as: selected user (password mode) ─────────────────── */
        .selected-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0.875rem;
            background: rgba(94,234,212,0.05);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-sm);
            margin-bottom: 1.25rem;
        }
        .selected-user-info { flex: 1; min-width: 0; }
        .selected-user-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .selected-user-sub {
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── Divider ────────────────────────────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1.125rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Form fields ────────────────────────────────────────────────── */
        .field { margin-bottom: 0.875rem; }
        .field label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 0.375rem;
        }
        .field input {
            width: 100%;
            padding: 0.6875rem 0.875rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
            -webkit-appearance: none;
        }
        .field input::placeholder { color: var(--text-muted); }
        .field input:hover { border-color: rgba(255,255,255,0.14); }
        .field input:focus {
            border-color: var(--primary);
            background: var(--surface-3);
            box-shadow: 0 0 0 3px rgba(94,234,212,0.1);
        }

        /* ── Submit button ──────────────────────────────────────────────── */
        .btn {
            width: 100%;
            margin-top: 0.375rem;
            padding: 0.6875rem 1rem;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-sm);
            color: #071412;
            font-family: var(--font);
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
        }
        .btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 16px rgba(94,234,212,0.25);
            transform: translateY(-1px);
        }
        .btn:active { transform: none; box-shadow: none; }

        /* ── Switch-account link ────────────────────────────────────────── */
        .switch-link {
            display: block;
            width: 100%;
            margin-top: 0.875rem;
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.8125rem;
            color: var(--text-dim);
            text-align: center;
            transition: color 0.15s;
            padding: 0;
        }
        .switch-link:hover { color: var(--primary); }

        /* ── Footer ─────────────────────────────────────────────────────── */
        .footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
    <style th:if="${brandingCustomCss != null && !#strings.isEmpty(brandingCustomCss)}" th:text="${brandingCustomCss}"></style>
</head>
<body>

<!-- Apply branding tokens before any paint to avoid FOUC -->
<script th:inline="javascript">
(function() {
    var r = document.documentElement;
    var pc = /*[[${brandingPrimaryColor}]]*/ '#5eead4';
    var bg = /*[[${brandingBgColor}]]*/ '#0a0c10';
    var tc = /*[[${brandingTextColor}]]*/ '#f1f5f9';
    var ff = /*[[${brandingFontFamily}]]*/ '';
    if (pc) {
        r.style.setProperty('--primary', pc);
        r.style.setProperty('--primary-hover', pc);
    }
    if (bg) r.style.setProperty('--bg', bg);
    if (tc) r.style.setProperty('--text', tc);
    if (ff) r.style.setProperty('--font', "'" + ff + "', 'Inter', system-ui, sans-serif");
})();
</script>

<div class="wrap">
<div class="card">

    <!-- Logo / header -->
    <div class="hd">
        <th:block th:if="${brandingLogoUrl != null && !#strings.isEmpty(brandingLogoUrl)}">
            <img class="hd-logo-img" th:src="${brandingLogoUrl}" alt="logo"/>
        </th:block>
        <th:block th:unless="${brandingLogoUrl != null && !#strings.isEmpty(brandingLogoUrl)}">
            <div class="hd-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="var(--primary)" stroke-width="1.75"
                     stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <circle cx="12" cy="16" r="1.5" fill="var(--primary)" stroke="none"/>
                </svg>
            </div>
        </th:block>
        <div class="hd-title" th:text="${appName != null ? appName : 'AO ID'}">AO ID</div>
        <div class="hd-sub"
             th:text="${brandingWelcomeText != null && !#strings.isEmpty(brandingWelcomeText) ? brandingWelcomeText : 'Hesabınıza daxil olun'}">
            Hesabınıza daxil olun
        </div>
    </div>

    <!-- OAuth2 app context banner -->
    <div th:if="${clientId != null}" class="app-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span><strong th:text="${appName != null ? appName : clientId}">tətbiq</strong> hesabınıza giriş tələb edir</span>
    </div>

    <!-- Error -->
    <div th:if="${error}" class="err" role="alert">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span th:text="${error}">Kimlik təsdiqi alınmadı</span>
    </div>

    <!-- ── Continue-as: stored accounts ─────────────────────────────── -->
    <div id="continue-section" style="display:none">
        <div id="accounts-list" class="accounts-list"></div>
        <div class="divider">və ya başqa hesabla</div>
    </div>

    <!-- Selected user context (shown in password-only mode) -->
    <div id="selected-user" style="display:none" class="selected-user">
        <div class="account-avatar" id="sel-avatar" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.875rem;font-weight:700;color:#0a1a1a;flex-shrink:0;background:linear-gradient(135deg,var(--primary),var(--primary-hover));font-family:var(--font)">?</div>
        <div class="selected-user-info">
            <div class="selected-user-name" id="sel-name"></div>
            <div class="selected-user-sub" id="sel-uname"></div>
        </div>
    </div>

    <!-- Login form -->
    <form th:action="@{/login}" method="post" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="client_id"             th:value="${clientId}"/>
        <input type="hidden" name="redirect_uri"          th:value="${redirectUri}"/>
        <input type="hidden" name="state"                 th:value="${state}"/>
        <input type="hidden" name="scope"                 th:value="${scope}"/>
        <input type="hidden" name="code_challenge"        th:value="${codeChallenge}"/>
        <input type="hidden" name="code_challenge_method" th:value="${codeChallengeMethod}"/>
        <input type="hidden" name="identifier_mode" id="identifier_mode"
               th:value="${identifierType == 'email' ? 'email' : (identifierType == 'any' ? 'any' : 'username')}"/>

        <div class="field" id="username-field">
            <label for="username" id="username-label"
                   th:text="${identifierType == 'email' ? 'E-poçt' : 'İstifadəçi adı'}">İstifadəçi adı</label>
            <input th:type="${identifierType == 'email' ? 'email' : 'text'}"
                   id="username" name="username"
                   th:autocomplete="${identifierType == 'email' ? 'email' : 'username'}"
                   autofocus required
                   th:placeholder="${identifierType == 'email' ? 'user@example.com' : (identifierType == 'any' ? 'istifadəçi adı və ya e-poçt' : 'istifadəçi adı')}"/>
        </div>

        <div class="field">
            <label for="password">Şifrə</label>
            <input type="password" id="password" name="password"
                   autocomplete="current-password" required
                   placeholder="Şifrənizi daxil edin"/>
        </div>

        <button type="submit" class="btn">Daxil ol</button>

        <!-- Shown only in password-only mode (continue-as selected) -->
        <button type="button" id="switch-btn" class="switch-link"
                style="display:none" onclick="showFullForm()">
            Başqa hesab istifadə et
        </button>
    </form>

</div><!-- /card -->

<div class="footer"
     th:text="${brandingFooterText != null && !#strings.isEmpty(brandingFooterText) ? brandingFooterText : 'AO Identity Provider · 2026'}">
    AO Identity Provider · 2026
</div>
</div><!-- /wrap -->

<script>
// ── Identifier mode dynamic label ──────────────────────────────────────
(function() {
    var mf = document.getElementById('identifier_mode');
    if (!mf || mf.value !== 'any') return;
    var inp = document.getElementById('username');
    var lbl = document.getElementById('username-label');
    if (!inp || !lbl) return;
    inp.addEventListener('input', function() {
        lbl.textContent = inp.value.indexOf('@') !== -1 ? 'E-poçt' : 'İstifadəçi adı';
    });
})();

// ── Multi-account continue-as ──────────────────────────────────────────
var _caEnabled = /*[[${continueAsEnabled}]]*/ true;

function _getCookie(name) {
    var m = document.cookie.match('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '=([^;]*)');
    return m ? decodeURIComponent(m[1]) : null;
}
function _b64Decode(s) {
    try {
        return decodeURIComponent(atob(s.replace(/-/g,'+').replace(/_/g,'/')).split('').map(function(c){
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
    } catch(e) { return null; }
}
function _b64Encode(s) {
    return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getProfiles() {
    var raw = _getCookie('ao-user');
    if (!raw) return [];
    var json = _b64Decode(raw);
    if (!json) return [];
    try {
        var p = JSON.parse(json);
        if (Array.isArray(p)) return p.filter(function(x){ return x && x.u; });
        if (p && p.u) return [p];
    } catch(e) {}
    return [];
}
function saveProfiles(profiles) {
    var sec = location.protocol === 'https:' ? '; Secure' : '';
    if (profiles.length === 0) {
        document.cookie = 'ao-user=; path=/; max-age=0' + sec;
    } else {
        document.cookie = 'ao-user=' + _b64Encode(JSON.stringify(profiles)) + '; path=/; max-age=' + (30*24*3600) + sec;
    }
}

function renderAccounts(profiles) {
    var section = document.getElementById('continue-section');
    var list    = document.getElementById('accounts-list');
    if (!section || !list) return;
    if (!profiles || !profiles.length) { section.style.display = 'none'; return; }

    var html = '';
    for (var i = 0; i < profiles.length; i++) {
        var p = profiles[i];
        var displayName = _esc(p.n || p.u);
        var initial     = (p.n || p.u).charAt(0).toUpperCase();
        var u           = _esc(p.u).replace(/'/g,'&#39;');
        var n           = _esc(p.n || p.u).replace(/'/g,'&#39;');
        html +=
            '<div class="account-row">' +
              '<button type="button" class="account-main" onclick="selectAccount(\'' + u + '\',\'' + n + '\')">' +
                '<div class="account-avatar">' + _esc(initial) + '</div>' +
                '<div class="account-info">' +
                  '<div class="account-name">' + displayName + '</div>' +
                  '<div class="account-uname">' + _esc(p.u) + '</div>' +
                '</div>' +
                '<svg class="account-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
              '</button>' +
              '<button type="button" class="account-remove" onclick="removeAccount(\'' + u + '\')" title="Bu hesabı siyahıdan sil">' +
                '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
              '</button>' +
            '</div>';
    }
    list.innerHTML = html;
    section.style.display = '';
}

// One-click: hide account list, show selected-user header + password field only
function selectAccount(username, displayName) {
    // Populate hidden username field
    var uField = document.getElementById('username');
    if (uField) uField.value = username;

    // Hide the continue-as section + username field
    document.getElementById('continue-section').style.display = 'none';
    document.getElementById('username-field').style.display = 'none';

    // Show selected-user context
    var sel = document.getElementById('selected-user');
    var av  = document.getElementById('sel-avatar');
    var nm  = document.getElementById('sel-name');
    var un  = document.getElementById('sel-uname');
    if (av) av.textContent = (displayName || username).charAt(0).toUpperCase();
    if (nm) nm.textContent = displayName || username;
    if (un) un.textContent = username;
    if (sel) sel.style.display = 'flex';

    // Show "use another account" link, focus password
    var sw = document.getElementById('switch-btn');
    if (sw) sw.style.display = '';
    var pw = document.getElementById('password');
    if (pw) { pw.value = ''; pw.focus(); }
}

// "Use another account" — restore full form
function showFullForm() {
    document.getElementById('selected-user').style.display = 'none';
    document.getElementById('switch-btn').style.display = 'none';
    document.getElementById('username-field').style.display = '';

    var uField = document.getElementById('username');
    if (uField) { uField.value = ''; uField.focus(); }

    var profiles = getProfiles();
    if (profiles.length) {
        document.getElementById('continue-section').style.display = '';
    }
}

function removeAccount(username) {
    var profiles = getProfiles().filter(function(p){ return p.u !== username; });
    saveProfiles(profiles);
    renderAccounts(profiles);
    // If currently in password mode for this user, return to full form
    var uField = document.getElementById('username');
    if (uField && uField.value === username) showFullForm();
}

// ── Init ──────────────────────────────────────────────────────────────
if (_caEnabled) {
    renderAccounts(getProfiles());
}
</script>
</body>
</html>
