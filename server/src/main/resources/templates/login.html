<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="az">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${appName != null ? appName + ' — AO ID' : 'AO ID — Daxil ol'}">AO ID — Daxil ol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --c:    #00ffff;
            --cd:   #00d4e8;
            --cm:   #009bb5;
            --cb:   #006b8a;
            --bg:   #000;
            --s:    #020d10;
            --s2:   #041520;
            --br:   rgba(0,255,255,0.25);
            --glow: 0 0 8px rgba(0,255,255,0.6), 0 0 20px rgba(0,255,255,0.25);
            --font: 'JetBrains Mono', 'Courier New', monospace;
        }

        html, body { min-height: 100vh; background: var(--bg); color: var(--c); font-family: var(--font); }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,255,0.012) 2px,
                rgba(0,255,255,0.012) 4px
            );
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 40%, rgba(0,255,255,0.05) 0%, transparent 65%);
        }

        .wrap {
            width: 100%;
            max-width: 360px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .hd {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hd-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border: 1px solid var(--br);
            background: var(--s);
            margin-bottom: 1rem;
            box-shadow: var(--glow);
        }

        .hd-dot svg { filter: drop-shadow(0 0 4px rgba(0,255,255,0.8)); }

        .hd-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--c);
            text-shadow: 0 0 8px rgba(0,255,255,0.9), 0 0 24px rgba(0,255,255,0.4);
        }

        .hd-sub {
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cb);
            margin-top: 0.3rem;
        }

        /* ── App banner ── */
        .app-banner {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.85rem;
            border: 1px solid rgba(0,255,255,0.2);
            border-left: 2px solid var(--c);
            background: rgba(0,255,255,0.04);
            font-size: 0.75rem;
            color: var(--cd);
            margin-bottom: 1rem;
        }

        .app-banner strong { color: var(--c); font-weight: 700; }

        /* ── Card ── */
        .card {
            background: var(--s);
            border: 1px solid var(--br);
            padding: 1.75rem;
            box-shadow: 0 0 30px rgba(0,255,255,0.06), inset 0 0 30px rgba(0,255,255,0.015);
        }

        .card-label {
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cb);
            margin-bottom: 0.2rem;
        }

        .card-prompt {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--c);
            text-shadow: 0 0 6px rgba(0,255,255,0.5);
            margin-bottom: 1.5rem;
        }

        /* ── Error ── */
        .err {
            display: flex;
            gap: 0.5rem;
            border: 1px solid rgba(255,51,51,0.35);
            background: rgba(255,51,51,0.06);
            color: #ff4444;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 0 8px rgba(255,51,51,0.15);
        }

        .err-tag { flex-shrink: 0; font-weight: 700; }

        /* ── Fields ── */
        .field { margin-bottom: 1rem; }

        .field label {
            display: block;
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cd);
            margin-bottom: 0.4rem;
        }

        .field input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--br);
            color: var(--c);
            font-family: var(--font);
            font-size: 0.875rem;
            outline: none;
            caret-color: var(--c);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .field input::placeholder { color: var(--cb); }

        .field input:focus {
            border-color: var(--c);
            box-shadow: var(--glow);
        }

        /* ── Submit ── */
        .btn {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--c);
            color: var(--c);
            font-family: var(--font);
            font-size: 0.8125rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: var(--glow);
        }

        .btn:hover {
            background: var(--c);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0,255,255,0.8), 0 0 40px rgba(0,255,255,0.4);
        }

        /* ── Footer meta ── */
        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0,255,255,0.1);
            font-size: 0.625rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--cb);
        }

        .meta span { display: inline-flex; align-items: center; gap: 0.35rem; }

        .meta-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--cb);
            display: inline-block;
        }

        /* ── Bottom ── */
        .bottom {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--cb);
        }
    </style>
</head>
<body>

<div class="wrap">

    <div class="hd">
        <div class="hd-dot">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="1"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                <circle cx="12" cy="16" r="1.5" fill="#00ffff" stroke="none"/>
            </svg>
        </div>
        <div class="hd-title">AO ID</div>
        <div class="hd-sub">auth.ao.az · kimlik təminatçısı</div>
    </div>

    <div th:if="${clientId != null}" class="app-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span><strong th:text="${appName != null ? appName : clientId}">tətbiq</strong> hesabınıza giriş tələb edir</span>
    </div>

    <div class="card">
        <div class="card-label">auth.ao.az</div>
        <div class="card-prompt">&gt; authenticate</div>

        <div th:if="${error}" class="err" role="alert">
            <span class="err-tag">[ERR]</span>
            <span th:text="${error}">Kimlik təsdiqi alınmadı</span>
        </div>

        <form th:action="@{/login}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="client_id"             th:value="${clientId}"/>
            <input type="hidden" name="redirect_uri"          th:value="${redirectUri}"/>
            <input type="hidden" name="state"                 th:value="${state}"/>
            <input type="hidden" name="scope"                 th:value="${scope}"/>
            <input type="hidden" name="code_challenge"        th:value="${codeChallenge}"/>
            <input type="hidden" name="code_challenge_method" th:value="${codeChallengeMethod}"/>

            <div class="field">
                <label for="username"># istifadəçi adı</label>
                <input type="text" id="username" name="username"
                       autocomplete="username" autofocus required
                       placeholder="username"/>
            </div>

            <div class="field">
                <label for="password"># şifrə</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required
                       placeholder="password"/>
            </div>

            <button type="submit" class="btn">&gt; daxil ol</button>
        </form>

        <div class="meta">
            <span><span class="meta-dot"></span>LDAP · Active Directory</span>
            <span><span class="meta-dot"></span>OAuth 2.0 · OIDC</span>
            <span><span class="meta-dot"></span>RS256 · PKCE</span>
        </div>
    </div>

    <div class="bottom">AO Identity Provider · TLS qorunur · 2026</div>
</div>

</body>
</html>
