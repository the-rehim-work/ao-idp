<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO IDP Admin Dashboard</title>
    <link rel="icon" th:href="@{/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="shell">
    <aside class="sidebar">
        <h2>AO IDP</h2>
        <nav>
            <a class="active" href="/admin/dashboard">Dashboard</a>
            <a href="/admin/applications">Tətbiqlər</a>
            <a href="/admin/users">İstifadəçilər</a>
            <a href="/admin/directory">LDAP</a>
            <a href="/admin/admins">Adminlər</a>
            <a href="/admin/audit">Audit</a>
            <a href="/admin/logout">Çıxış</a>
        </nav>
    </aside>
    <main class="content">
        <header class="topbar">
            <div>
                <h1>Dashboard</h1>
                <p class="muted" th:text="${adminDisplayName + ' (' + adminType + ')'}"></p>
            </div>
        </header>
        <section class="stats">
            <article class="card"><h3>Aktiv istifadəçilər</h3><p th:text="${totalUsers}"></p></article>
            <article class="card"><h3>Aktiv tətbiqlər</h3><p th:text="${totalApps}"></p></article>
            <article class="card"><h3>Audit hadisələri</h3><p th:text="${auditEvents}"></p></article>
        </section>
        <section class="card">
            <h3>Son audit qeydləri</h3>
            <table>
                <thead>
                <tr><th>Vaxt</th><th>Action</th><th>Actor</th><th>Entity</th></tr>
                </thead>
                <tbody>
                <tr th:each="log : ${recentAudits}">
                    <td th:text="${log.createdAt}"></td>
                    <td th:text="${log.action}"></td>
                    <td th:text="${log.actorType + ':' + log.actorId}"></td>
                    <td th:text="${log.targetType + ':' + log.targetId}"></td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
