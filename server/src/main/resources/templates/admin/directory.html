<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO IDP Admin LDAP</title>
    <link rel="icon" th:href="@{/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="shell">
    <aside class="sidebar">
        <h2>AO IDP</h2>
        <nav>
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/applications">Tətbiqlər</a>
            <a href="/admin/users">İstifadəçilər</a>
            <a class="active" href="/admin/directory">LDAP</a>
            <a href="/admin/admins">Adminlər</a>
            <a href="/admin/audit">Audit</a>
            <a href="/admin/logout">Çıxış</a>
        </nav>
    </aside>
    <main class="content">
        <header class="topbar">
            <h1>LDAP Kataloqu</h1>
            <form method="get" action="/admin/directory" class="inline-form" id="ldap-filter-form">
                <input type="text" name="dn" placeholder="DN" th:value="${dn}" id="ldap-dn-input">
                <input type="text" name="search" placeholder="Axtarış" th:value="${search}" id="ldap-search-input">
                <button type="submit">Filtrlə</button>
            </form>
        </header>
        <div style="display:grid; grid-template-columns: 320px 1fr; gap: 16px; align-items:start;">
            <section class="card">
                <h3>LDAP ağacı</h3>
                <div id="ldap-tree" style="margin-top: 12px;"></div>
            </section>
            <section class="card">
                <h3>LDAP istifadəçiləri</h3>
                <p class="ok" th:if="${success}" th:text="${success}"></p>
                <p class="error" th:if="${error}" th:text="${error}"></p>
                <table>
                    <thead>
                    <tr><th>Username</th><th>Display Name</th><th>Email</th><th>OU</th><th>Vəzifə</th><th>Əməliyyat</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${ldapUsers}">
                        <td th:text="${user.ldapUsername}"></td>
                        <td th:text="${user.displayName}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.ou}"></td>
                        <td th:text="${user.title}"></td>
                        <td>
                            <form method="post" action="/admin/directory/activate-and-grant" class="inline-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="ldapUsername" th:value="${user.ldapUsername}">
                                <select name="appId" required>
                                    <option value="">Tətbiq seç</option>
                                    <option th:each="app : ${allApps}" th:value="${app.id}" th:text="${app.name}"></option>
                                </select>
                                <button type="submit">Aktiv et + Grant</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
        <div id="ldap-activate-modal"
             style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 60; padding: 18px; align-items:center; justify-content:center;">
            <div style="max-width: 560px; width: 100%; background:#000; border: 1px solid rgba(0,245,255,0.22); border-radius: 12px; overflow:hidden;">
                <div style="display:flex; align-items:center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(0,245,255,0.14);">
                    <div style="display:flex; flex-direction: column; gap: 2px;">
                        <div style="font-size: 12px; opacity: 0.95; color: rgba(0,245,255,0.95); text-transform: uppercase; letter-spacing: 0.12em;">grant access</div>
                        <div id="ldap-activate-modal-user" style="font-size: 14px; font-weight: 700; color: rgba(0,245,255,1);">user</div>
                    </div>
                    <button type="button" id="ldap-activate-modal-close" class="ghost" style="font-size: 24px; padding: 0 10px; border: none;">×</button>
                </div>

                <div style="padding: 16px;">
                    <div style="display:flex; flex-direction: column; gap: 12px;">
                        <div id="ldap-activate-modal-meta" style="border: 1px solid rgba(0,245,255,0.14); background: rgba(0,245,255,0.04); border-radius: 10px; padding: 12px; color: rgba(0,245,255,0.95); font-size: 13px;">
                            <div id="ldap-activate-modal-email" style="opacity:0.85; margin-bottom: 4px;"></div>
                            <div id="ldap-activate-modal-title" style="opacity:0.85; margin-bottom: 4px;"></div>
                        </div>

                        <form id="ldap-activate-form" method="post" action="/admin/directory/activate-and-grant">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="ldapUsername" id="ldap-activate-ldap-username">
                            <div style="margin-bottom: 6px; font-size: 12px; opacity: 0.9; color: rgba(0,245,255,0.75);">Application</div>
                            <select name="appId" id="ldap-activate-app-id" style="width:100%;">
                                <option value="">Tətbiq seç</option>
                                <option th:each="app : ${allApps}" th:value="${app.id}" th:text="${app.name}"></option>
                            </select>

                            <div style="margin-top: 14px; display:flex; justify-content: flex-end; gap: 10px;">
                                <button type="button" id="ldap-activate-cancel" class="ghost" style="border: 1px solid rgba(0,245,255,0.22); background: transparent; color: rgba(0,245,255,0.75); padding: 10px 14px; border-radius: 10px; cursor: pointer;">Cancel</button>
                                <button type="submit" style="border: 1px solid rgba(0,245,255,0.5); background: transparent; color: rgba(0,245,255,0.95); padding: 10px 14px; border-radius: 10px; cursor: pointer;">Aktiv et + Grant</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        (function () {
            const cookieName = 'ao-admin-web';
            const getCookie = function (name) {
                const parts = document.cookie ? document.cookie.split('; ') : [];
                for (let i = 0; i < parts.length; i++) {
                    const p = parts[i].split('=');
                    const k = p[0];
                    if (k === name) return decodeURIComponent(p.slice(1).join('='));
                }
                return '';
            };

            const token = getCookie(cookieName);
            const dnInput = document.getElementById('ldap-dn-input');
            const form = document.getElementById('ldap-filter-form');
            const treeRoot = document.getElementById('ldap-tree');
            const modal = document.getElementById('ldap-activate-modal');
            const modalClose = document.getElementById('ldap-activate-modal-close');
            const modalCancel = document.getElementById('ldap-activate-cancel');
            const modalUser = document.getElementById('ldap-activate-modal-user');
            const emailEl = document.getElementById('ldap-activate-modal-email');
            const titleEl = document.getElementById('ldap-activate-modal-title');
            const modalLdapUsername = document.getElementById('ldap-activate-ldap-username');

            function closeModal() {
                if (modal) modal.style.display = 'none';
            }

            function openModal(node) {
                if (!modal) return;
                modalUser.textContent = node.name || node.rdn || node.dn || '';
                emailEl.textContent = node.email ? ('email: ' + node.email) : '';
                titleEl.textContent = node.title ? ('title: ' + node.title) : '';
                if (modalLdapUsername) modalLdapUsername.value = node.ldapUsername || node.ldap_username || '';
                modal.style.display = 'flex';
            }

            if (modalClose) modalClose.addEventListener('click', closeModal);
            if (modalCancel) modalCancel.addEventListener('click', closeModal);
            if (modal) modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });

            const loadedChildren = new Map();

            function badgeHtml(text, color) {
                return '<span style="padding: 2px 8px; border: 1px solid ' + color + '44; background:' + color + '0d; color:' + color + '; font-size: 11px; border-radius: 999px; margin-left: 8px;">' + text + '</span>';
            }

            async function fetchTreeChildren(dn) {
                const url = dn ? ('/admin/api/v1/ldap/tree?dn=' + encodeURIComponent(dn)) : '/admin/api/v1/ldap/tree';
                const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
                if (!r.ok) throw new Error('LDAP tree fetch failed');
                return await r.json();
            }

            function setSelectedDn(dn) {
                if (!dnInput) return;
                dnInput.value = dn || '';
                if (form) form.submit();
            }

            function renderNodes(nodes, container) {
                const ul = document.createElement('ul');
                ul.className = 'flat-list';
                ul.style.listStyle = 'none';
                ul.style.paddingLeft = '16px';

                nodes.forEach(node => {
                    const li = document.createElement('li');
                    li.style.margin = '6px 0';

                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.alignItems = 'center';
                    row.style.gap = '10px';

                    const typeLabel = node.type ? String(node.type).toUpperCase() : '';
                    const label = document.createElement('button');
                    label.type = 'button';
                    label.textContent = node.name || typeLabel || node.rdn || node.dn;
                    label.style.background = 'transparent';
                    label.style.border = 'none';
                    label.style.color = 'rgba(0,245,255,0.92)';
                    label.style.cursor = 'pointer';
                    label.style.fontFamily = 'inherit';
                    label.style.padding = '0';
                    label.onclick = function () {
                        if (node.type === 'user') {
                            openModal(node);
                            return;
                        }
                        setSelectedDn(node.dn);
                    };

                    row.appendChild(label);

                    if (node.has_children) {
                        const caret = document.createElement('button');
                        caret.type = 'button';
                        caret.textContent = '+';
                        caret.style.background = 'transparent';
                        caret.style.border = 'none';
                        caret.style.color = 'rgba(0,245,255,0.92)';
                        caret.style.cursor = 'pointer';
                        caret.style.fontFamily = 'inherit';
                        caret.style.padding = '0';
                        caret.onclick = async function (e) {
                            e.preventDefault();
                            e.stopPropagation();
                            const key = node.dn;
                            const existing = li.querySelector('[data-children-for=\"' + key + '\"]');
                            if (existing) {
                                existing.remove();
                                caret.textContent = '+';
                                return;
                            }
                            if (loadedChildren.has(key)) {
                                caret.textContent = '-';
                                const childrenWrap = document.createElement('div');
                                childrenWrap.dataset.childrenFor = key;
                                childrenWrap.style.marginLeft = '10px';
                                li.appendChild(childrenWrap);
                                renderNodes(loadedChildren.get(key), childrenWrap);
                                return;
                            }
                            try {
                                caret.textContent = '…';
                                const children = await fetchTreeChildren(node.dn);
                                loadedChildren.set(key, children);
                                const childrenWrap = document.createElement('div');
                                childrenWrap.dataset.childrenFor = key;
                                childrenWrap.style.marginLeft = '10px';
                                li.appendChild(childrenWrap);
                                caret.textContent = '-';
                                renderNodes(children, childrenWrap);
                            } catch (err) {
                                caret.textContent = '+';
                            }
                        };
                        row.insertBefore(caret, label);
                    }

                    const isActivated = node.is_activated === true;
                    if (isActivated) {
                        row.innerHTML += badgeHtml('ACT', 'rgba(0,204,255,1)');
                    }

                    li.appendChild(row);
                    ul.appendChild(li);
                });

                container.appendChild(ul);
            }

            async function init() {
                if (!token) {
                    treeRoot.textContent = 'Admin token not found in cookie';
                    return;
                }
                try {
                    const nodes = await fetchTreeChildren(null);
                    treeRoot.innerHTML = '';
                    renderNodes(nodes, treeRoot);
                } catch (e) {
                    treeRoot.textContent = 'LDAP ağacı yüklənmədi';
                }
            }

            init();
        })();
    </script>
</div>
</body>
</html>
