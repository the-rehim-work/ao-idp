services:
  idp-server:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-ao_idp}
      DB_USERNAME: ${DB_USERNAME:-ao_idp}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      LDAP_URL: ${LDAP_URL}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_SERVICE_ACCOUNT_DN: ${LDAP_SERVICE_ACCOUNT_DN}
      LDAP_SERVICE_PASSWORD: ${LDAP_SERVICE_PASSWORD}
      LDAP_USERNAME_ATTR: ${LDAP_USERNAME_ATTR}
      LDAP_USER_OBJECT_CLASS: ${LDAP_USER_OBJECT_CLASS}
      IDP_ISSUER: ${IDP_ISSUER}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    restart: unless-stopped
    networks:
      - idp

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      idp-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - idp

networks:
  idp:
    driver: bridge
