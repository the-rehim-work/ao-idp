# ─── auth.ao.az — AO Identity Provider ──────────────────────────────────────
# Place this file in /etc/nginx/sites-available/auth.ao.az.conf
# then: ln -s /etc/nginx/sites-available/auth.ao.az.conf /etc/nginx/sites-enabled/
# and:  nginx -t && systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name auth.ao.az;

    return 301 https://$host$request_uri;
}

# Upstream — Docker container exposed on host port 7000
upstream ao_idp {
    server 127.0.0.1:7000;
    keepalive 32;
}

# HTTPS — proxy to AO IDP container
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.ao.az;

    # ── TLS certificates (adjust paths for your cert provider / acme.sh / certbot)
    ssl_certificate     /etc/ssl/ao.az/auth.ao.az.crt;
    ssl_certificate_key /etc/ssl/ao.az/auth.ao.az.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging
    access_log /var/log/nginx/auth.ao.az.access.log;
    error_log  /var/log/nginx/auth.ao.az.error.log;

    # ── Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Buffer settings (important for login form posts)
    proxy_buffer_size          16k;
    proxy_buffers              4 32k;
    proxy_busy_buffers_size    64k;

    # ── OAuth2 / OIDC protocol endpoints
    location /oauth2/ {
        proxy_pass http://ao_idp/oauth2/;
    }

    # ── OIDC discovery + JWKS
    location /.well-known/ {
        proxy_pass http://ao_idp/.well-known/;
    }

    location /jwks {
        proxy_pass http://ao_idp/jwks;
    }

    # ── Login page (user-facing)
    location /login {
        proxy_pass http://ao_idp/login;
    }

    # ── Admin panel (restrict to internal IPs if desired)
    location /admin/ {
        # Optional: allow only internal network
        # allow 10.0.0.0/8;
        # allow 192.168.0.0/16;
        # deny all;

        proxy_pass http://ao_idp/admin/;
    }

    # ── Static assets
    location /static/ {
        proxy_pass http://ao_idp/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Root → redirect to admin panel
    location / {
        proxy_pass http://ao_idp/;
    }
}
