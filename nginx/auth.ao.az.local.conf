server {
    listen 80;
    server_name auth.ao.az;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name auth.ao.az;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/auth.ao.az.access.log;
    error_log  /var/log/nginx/auth.ao.az.error.log;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_buffer_size       16k;
    proxy_buffers           4 32k;
    proxy_busy_buffers_size 64k;

    location /oauth2/ {
        proxy_pass http://ao-idp:7000/oauth2/;
    }

    location /.well-known/ {
        proxy_pass http://ao-idp:7000/.well-known/;
    }

    location /jwks {
        proxy_pass http://ao-idp:7000/jwks;
    }

    location /login {
        proxy_pass http://ao-idp:7000/login;
    }

    location /admin/ {
        proxy_pass http://ao-idp:7000/admin/;
    }

    location /static/ {
        proxy_pass http://ao-idp:7000/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://ao-idp:7000/;
    }
}
